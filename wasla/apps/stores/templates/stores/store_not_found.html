{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Store Not Found" %}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-danger">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-shop text-danger" style="font-size: 3rem;"></i>
                    </div>
                    
                    <h2 class="card-title mb-3 text-danger">
                        {% trans "Store Unavailable" %}
                    </h2>
                    
                    <p class="card-text text-muted mb-4">
                        {{ message }}
                    </p>
                    
                    <p class="text-muted small mb-4">
                        {% trans "This store is currently unavailable. Please check back later." %}
                    </p>
                    
                    <a href="/" class="btn btn-primary">
                        <i class="bi bi-house"></i>
                        {% trans "Back to Home" %}
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
