{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Access denied" %}{% endblock %}

{% block body %}
<div class="center">
  <div class="card" style="padding:20px; max-width:520px;">
    <h1 style="margin:0 0 8px;">{% trans "Access denied" %}</h1>
    <p class="muted" style="margin:0 0 14px;">
      {{ message|default:_("You don't have access to this store.") }}
    </p>
    <a class="btn btn-primary" href="{% url 'accounts:auth' %}">{% trans "Back to login" %}</a>
  </div>
</div>
{% endblock %}
