<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap");

.lang-switcher {
  display: none !important;
}

.dash {
  --primary: #0f766e;
  --accent: #f59e0b;
  --dash-bg: #f6f4ef;
  --dash-surface: #ffffff;
  --dash-surface-muted: #fdfbf6;
  --dash-ink: #111827;
  --dash-muted: #6b7280;
  --dash-border: rgba(17, 24, 39, 0.08);
  --dash-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
  --dash-sidebar: #0f172a;
  --dash-sidebar-2: #172440;
  --dash-sidebar-border: rgba(255, 255, 255, 0.08);

  min-height: 100vh;
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr);
  background:
    radial-gradient(circle at 16% 0%, rgba(15, 118, 110, 0.12), transparent 45%),
    radial-gradient(circle at 82% 18%, rgba(245, 158, 11, 0.12), transparent 40%),
    var(--dash-bg);
  color: var(--dash-ink);
  font-family: "Manrope", "Tajawal", sans-serif;
}

html[dir="rtl"] .dash {
  font-family: "Tajawal", "Manrope", sans-serif;
}

.dash .card {
  background: var(--dash-surface);
  border: 1px solid var(--dash-border);
  border-radius: 18px;
  box-shadow: var(--dash-shadow);
}

.dash .form-control {
  inline-size: 100%;
  min-height: 44px;
  padding-block: 10px;
  padding-inline: 12px;
  border: 1px solid var(--dash-border);
  border-radius: 12px;
  background: var(--dash-surface);
  color: var(--dash-ink);
  outline: none;
}

.dash .form-control:focus {
  border-color: var(--primary);
}

.dash__sidebar {
  position: sticky;

  overflow: auto;
  padding: 22px 18px 28px;
  background: linear-gradient(180deg, var(--dash-sidebar), var(--dash-sidebar-2));
  color: #e2e8f0;
  border-inline-end: 1px solid var(--dash-sidebar-border);
}

.dash__brand {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--dash-sidebar-border);
}

.dash__logo {
  display: grid;
  place-items: center;
  inline-size: 40px;
  block-size: 40px;
  border-radius: 14px;
  background: linear-gradient(135deg, #2dd4bf, #f59e0b);
  color: #0b1120;
  font-weight: 800;
  letter-spacing: 0.4px;
}

.dash__brand-text strong {
  display: block;
  font-size: 16px;

}

.dash__brand-text small {

}

.dash__store-card {

  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
}

.dash__store-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(226, 232, 240, 0.6);

.dash__store-name {

  font-size: 16px;
  font-weight: 700;
}

.dash__store-meta {

  flex-wrap: wrap;
  gap: 6px;
}

.dash__pill {

  align-items: center;

  padding-inline: 10px;
  border-radius: 999px;

  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.16);
  color: rgba(226, 232, 240, 0.92);
}

.dash__nav {

  gap: 8px;
  margin-block-start: 18px;
}

.dash__nav-title {
  margin-block: 6px 2px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(226, 232, 240, 0.5);
}

  align-items: center;

  padding-inline: 12px;
  border-radius: 14px;
  border: 1px solid transparent;
  color: rgba(226, 232, 240, 0.86);
  font-weight: 600;
  transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
}

.dash__link-dot {
  inline-size: 8px;
  block-size: 8px;
  border-radius: 50%;

  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
}

  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.1);

}

  background: rgba(45, 212, 191, 0.16);
  border-color: rgba(45, 212, 191, 0.3);
  color: #f8fafc;
}

  background: #2dd4bf;
  box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.2);
}

  margin-block-start: 16px;
  padding: 14px;
  border-radius: 16px;
  background: rgba(15, 23, 42, 0.55);
  border: 1px solid var(--dash-sidebar-border);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
}

.dash__sidebar-title {
  font-weight: 600;
  color: rgba(226, 232, 240, 0.7);
  margin-block-end: 8px;
}

.dash__plan-name {
  font-size: 16px;
  font-weight: 700;
  color: #f8fafc;
}

.dash__plan-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.dash__status {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding-inline: 10px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.08);
  color: rgba(226, 232, 240, 0.9);
  font-size: 12px;
  font-weight: 600;
}

.dash__lang-form {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-block-start: 8px;
}

.dash__logout {

}

.dash__sidebar .btn {
  inline-size: 100%;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.18);
  color: #f8fafc;
}

.dash__sidebar .btn:hover {
  background: rgba(255, 255, 255, 0.16);
}

.dash__main {

  display: grid;
  grid-template-rows: auto 1fr;
}

  padding: 18px 24px;

}

  display: grid;
  gap: 8px;
}

  align-items: center;

  font-weight: 600;
  background: var(--dash-surface);
}

.dash__title {
  margin: 0;
  font-size: 28px;
  line-height: 1.2;
  letter-spacing: -0.5px;
}

.dash__subtitle {
  margin: 0;
  color: var(--dash-muted);
}

.dash__content {
  min-width: 0;
  padding: 28px 24px 36px;
  display: grid;
  gap: 24px;
}

.dash__messages {
  display: grid;
  gap: 8px;
}

.dash__message {
  padding: 12px;
}

.dash__section {
  padding: 18px;
}

.dash__section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-block-end: 12px;
}

.dash__section-title {
  margin: 0;
  font-size: 18px;
}

.dash__section-note {
  margin: 0;
  color: var(--dash-muted);
  font-size: 14px;
}

.dash__kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}

.dash__kpi-card {
  padding: 18px;
  position: relative;
  overflow: hidden;
}

.dash__kpi-card::after {
  content: "";
  position: absolute;
  inset-inline: 0;
  inset-block-start: 0;
  block-size: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
}

.dash__kpi-label {
  color: var(--dash-muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.dash__kpi-value {
  margin-block-start: 10px;
  font-size: 26px;
  font-weight: 700;
}

.dash__table-wrap {
  overflow-x: auto;
}

.dash__table {
  inline-size: 100%;
  min-inline-size: 720px;
  border-collapse: collapse;
}

.dash__table th,
.dash__table td {

  white-space: nowrap;
}

  color: var(--dash-muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.dash__cell-end {
  text-align: end;
}

.dash__quick-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

  min-height: 60px;

  align-items: center;
  justify-content: space-between;
  padding-inline: 14px;
  border: 1px solid var(--dash-border);
  border-radius: 16px;
  font-weight: 600;
  background: var(--dash-surface);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.dash__quick-link::after {
  content: "+";

  color: var(--dash-muted);
}

.dash__quick-link:hover {

  box-shadow: var(--dash-shadow);
}

.dash__overview-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
  gap: 16px;
}

.dash .btn {
  border-radius: 14px;
  font-weight: 600;
}

.dash .btn-primary {
  background: linear-gradient(135deg, #0f766e, #f59e0b);
  color: #fff;
  border: none;
}

.dash .btn-soft {
  background: var(--dash-surface);
  border-color: var(--dash-border);
  color: var(--dash-ink);
}

  display: grid;
  gap: 20px;
}

  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}

  background: var(--dash-surface);
  padding: 18px;
  border-radius: 18px;
  border: 1px solid var(--dash-border);
  box-shadow: var(--dash-shadow);
  position: relative;
  overflow: hidden;
}

.kpi-card::after {
  content: "";
  position: absolute;
  inset-inline: 0;
  inset-block-start: 0;
  block-size: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
}

.kpi-card.revenue::after {
  background: linear-gradient(90deg, #2c8a76, #6cc5b3);
}

.kpi-card.orders::after {
  background: linear-gradient(90deg, #d7953b, #f2c177);
}

.kpi-card.conversion::after {
  background: linear-gradient(90deg, #d97758, #f2a98b);
}

.kpi-label {
  font-size: 12px;
  color: var(--dash-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.kpi-value {
  font-size: 26px;
  font-weight: 700;
  color: var(--dash-ink);
  margin-block-start: 10px;
}

.kpi-subtext {
  font-size: 12px;
  color: var(--dash-muted);
}

.chart-container,
.funnel-container {
  background: var(--dash-surface);
  padding: 18px;
  border-radius: 18px;
  border: 1px solid var(--dash-border);
  box-shadow: var(--dash-shadow);
}

.chart-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--dash-ink);
}

.funnel-stage {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
  gap: 12px;
}

.funnel-bar {
  flex: 1;
  background: linear-gradient(90deg, #0f766e, #2dd4bf);
  min-height: 40px;
  border-radius: 12px;

  align-items: center;
  padding: 0 14px;
  color: #f8fafc;
  font-weight: 600;
}

.funnel-stats {
  display: flex;
  gap: 12px;
  font-size: 13px;
}

.funnel-count {

}

.funnel-rate {
  color: var(--primary);
  font-weight: 700;
  min-width: 60px;
}

.funnel-summary {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--dash-border);
  color: var(--dash-muted);
}

.funnel-summary strong {
  color: var(--dash-ink);
}

.low-stock-table {
  width: 100%;

}

.low-stock-table th {
  padding: 12px;
  text-align: left;
  font-weight: 700;
  border-bottom: 1px solid var(--dash-border);
  color: var(--dash-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 11px;
}

.low-stock-table td {

}

.low-stock-table tr:hover {

}

}

  background: rgba(220, 38, 38, 0.12);

}

.stock-badge.low {
  background: rgba(245, 158, 11, 0.16);
  color: #92400e;
}

.empty-state {

}

.tabs {

  gap: 8px;

  border-radius: 999px;
  background: var(--dash-surface);
  border: 1px solid var(--dash-border);
  box-shadow: var(--dash-shadow);
  width: fit-content;
}

.tab-button {
  padding: 10px 16px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--dash-muted);
  border-radius: 999px;
  transition: background 0.2s ease, color 0.2s ease;
}

}

  font-weight: 600;

}

.btn-export:hover {

}

  .dash__kpi-grid,

}

@media (max-width: 992px) {

    position: static;
    block-size: auto;
    border-inline-end: none;

    padding: 20px 16px 32px;

  .kpi-grid,
  .dash__quick-grid,
  .dash__lang-form {
    grid-template-columns: 1fr;

    width: 100%;
    justify-content: center;
  }
}

html[dir="rtl"] .dash__sidebar {
  border-inline-end: none;
  border-inline-start: 1px solid var(--dash-sidebar-border);
}

html[dir="rtl"] .dash {
  grid-template-columns: minmax(0, 1fr) 300px;
}

html[dir="rtl"] .dash__sidebar {
  order: 2;
}

html[dir="rtl"] .dash__main {
  order: 1;
}

html[dir="rtl"] .dash__link:hover {
  transform: translateX(-2px);
}

html[dir="rtl"] .dash__quick-link::after {
  content: "+";
}
